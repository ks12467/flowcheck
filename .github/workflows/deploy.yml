name: FlowCheck CI/CD

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: flowcheck

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 설정 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 캐시 ─────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Gradle 빌드 (테스트 제외) ────────────────────────────────────────
      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # ── 5. Docker 이미지 빌드 ───────────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      # ── 6. Docker 이미지를 tar로 저장 ──────────────────────────────────────
      - name: Save Docker image
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ github.sha }} | gzip > flowcheck.tar.gz

      # ── 7. EC2로 이미지 전송 ────────────────────────────────────────────────
      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: flowcheck.tar.gz
          target: /home/${{ secrets.EC2_USER }}/

      # ── 8. EC2에서 컨테이너 재시작 ─────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GOOGLE_CREDS
          script: |
            # 이미지 로드
            docker load < ~/flowcheck.tar.gz

            # 기존 컨테이너 중지 및 제거
            docker stop flowcheck || true
            docker rm   flowcheck || true

            # credentials.json 복호화
            echo "$GOOGLE_CREDS" | base64 -d > /home/ubuntu/credentials.json

            # 새 컨테이너 실행
            docker run -d \
              --name flowcheck \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/ubuntu/credentials.json:/app/config/credentials.json:ro \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
              ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

            # 오래된 이미지 정리
            docker image prune -f

            # 헬스체크 (30초 대기)
            sleep 30
            docker ps | grep flowcheck
