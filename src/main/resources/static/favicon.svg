<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1F4E79"/>
  
  <!-- F letter (bold, white) -->
  <text x="10" y="48" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="white">F</text>
  
  <!-- Checkmark (✓) - positioned top-right, accent color -->
  <polyline points="36,14 42,22 54,8" 
            stroke="#4FC3F7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>