<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('구글폼 관리')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>

    <main class="content-area">
        <div class="flex-between mb-16">
            <h1 class="page-title" style="margin-bottom:0">구글폼 관리</h1>
            <button class="btn btn-primary" onclick="openCreateModal()">+ 구글폼 등록</button>
        </div>

        <!-- 서비스 계정 이메일 배너 -->
        <div id="serviceAccountBanner" class="card" style="display:none;margin-bottom:16px;">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span style="font-size:13px;color:var(--text-muted);">서비스 계정 이메일 (스프레드시트 공유 시 필요)</span>
                <code id="serviceAccountEmail"
                      style="font-size:13px;background:var(--bg);padding:4px 10px;border-radius:6px;color:var(--text);flex:1;min-width:0;word-break:break-all;"></code>
                <button class="btn-copy" onclick="copyServiceEmail(this)">복사</button>
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
                스프레드시트 등록 시 자동으로 공유를 시도합니다. 실패 시 위 이메일을 스프레드시트에 <strong>뷰어</strong>로 직접 추가해주세요.
            </div>
        </div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>폼 이름</th>
                            <th>트랙</th>
                            <th>구글폼 URL</th>
                            <th>스프레드시트 ID</th>
                            <th>점수 컬럼</th>
                            <th style="width:140px;text-align:center;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="formTableBody">
                        <tr>
                            <td colspan="6" style="text-align:center;color:#6C757D;padding:32px;">
                                불러오는 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- ════════════════════════════════════════════
     구글폼 등록 모달
════════════════════════════════════════════ -->
<div class="modal-overlay" id="createModal" onclick="closeModal('createModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">구글폼 등록</h2>
            <button class="modal-close" onclick="closeModal('createModal')">×</button>
        </div>

        <div class="form-group">
            <label class="form-label">폼 이름 <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="createName" placeholder="예: 7기 만족도 설문">
        </div>
        <div class="form-group">
            <label class="form-label">트랙 <span class="text-danger">*</span></label>
            <select class="form-control" id="createTrackId">
                <option value="">트랙 선택</option>
                <option th:each="t : ${allTracks}" th:value="${t.id}" th:text="${t.name}">트랙명</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">구글폼 URL <span class="text-danger">*</span></label>
            <input class="form-control" type="url" id="createFormUrl" placeholder="https://docs.google.com/forms/...">
        </div>
        <div class="form-group">
            <label class="form-label">스프레드시트 ID</label>
            <input class="form-control" type="text" id="createSpreadsheetId" placeholder="Google Sheets ID">
        </div>
        <div class="form-group">
            <label class="form-label">만족도 점수 컬럼 헤더명</label>
            <input class="form-control" type="text" id="createScoreColumnHeader" placeholder="예: 만족도 점수">
        </div>

        <div id="createError" class="alert-error" style="display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createModal')">취소</button>
            <button class="btn btn-primary" onclick="createForm()">등록</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════
     구글폼 수정 모달
════════════════════════════════════════════ -->
<div class="modal-overlay" id="editModal" onclick="closeModal('editModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">구글폼 수정</h2>
            <button class="modal-close" onclick="closeModal('editModal')">×</button>
        </div>

        <input type="hidden" id="editFormId">

        <div class="form-group">
            <label class="form-label">폼 이름 <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="editName">
        </div>
        <div class="form-group">
            <label class="form-label">트랙 <span class="text-danger">*</span></label>
            <select class="form-control" id="editTrackId">
                <option value="">트랙 선택</option>
                <option th:each="t : ${allTracks}" th:value="${t.id}" th:text="${t.name}">트랙명</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">구글폼 URL <span class="text-danger">*</span></label>
            <input class="form-control" type="url" id="editFormUrl">
        </div>
        <div class="form-group">
            <label class="form-label">스프레드시트 ID</label>
            <input class="form-control" type="text" id="editSpreadsheetId">
        </div>
        <div class="form-group">
            <label class="form-label">만족도 점수 컬럼 헤더명</label>
            <input class="form-control" type="text" id="editScoreColumnHeader">
        </div>

        <div id="editError" class="alert-error" style="display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">취소</button>
            <button class="btn btn-primary" onclick="updateForm()">저장</button>
        </div>
    </div>
</div>

<script>
    // ── 서비스 계정 이메일 로드 ─────────────────────
    async function loadServiceAccountEmail() {
        try {
            const res  = await fetch('/api/v1/admin/forms/service-account-email');
            const data = await res.json();
            const email = data.data?.email;
            if (email) {
                document.getElementById('serviceAccountEmail').textContent = email;
                document.getElementById('serviceAccountBanner').style.display = 'block';
            }
        } catch (_) { /* 이메일 조회 실패 시 배너 미표시 */ }
    }

    function copyServiceEmail(btn) {
        const email = document.getElementById('serviceAccountEmail').textContent;
        try {
            navigator.clipboard.writeText(email);
        } catch (_) {
            const ta = document.createElement('textarea');
            ta.value = email;
            ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
    }

    // ── 폼 목록 로드 ───────────────────────────────
    async function loadForms() {
        const res  = await fetch('/api/v1/admin/forms');
        const data = await res.json();
        renderForms(data.data || []);
    }

    function renderForms(forms) {
        const tbody = document.getElementById('formTableBody');
        if (forms.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6C757D;padding:32px;">등록된 구글폼이 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = forms.map(f => `
            <tr>
                <td style="font-weight:600;">${esc(f.name)}</td>
                <td class="text-muted">${esc(f.trackName)}</td>
                <td>
                    <a href="${esc(f.formUrl)}" target="_blank" rel="noopener"
                       style="color:var(--primary);font-size:12px;word-break:break-all;"
                       title="${esc(f.formUrl)}">
                        ${esc(f.formUrl.length > 40 ? f.formUrl.slice(0, 40) + '...' : f.formUrl)}
                    </a>
                </td>
                <td class="text-muted" style="font-size:12px;">${esc(f.spreadsheetId || '-')}</td>
                <td class="text-muted" style="font-size:12px;">${esc(f.scoreColumnHeader || '-')}</td>
                <td style="text-align:center;">
                    <button class="btn btn-outline" style="padding:4px 10px;font-size:12px;"
                            onclick="openEditModal(${f.formId},'${esc(f.name)}',${f.trackId},'${esc(f.formUrl)}','${esc(f.spreadsheetId||'')}','${esc(f.scoreColumnHeader||'')}')">수정</button>
                    <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;margin-left:4px;"
                            onclick="deleteForm(${f.formId})">삭제</button>
                </td>
            </tr>
        `).join('');
    }

    // ── 모달 공통 ──────────────────────────────────
    function closeModal(id, e) {
        if (e && e.target !== document.getElementById(id)) return;
        document.getElementById(id).classList.remove('open');
    }

    // ── 등록 ──────────────────────────────────────
    function openCreateModal() {
        document.getElementById('createName').value = '';
        document.getElementById('createTrackId').value = '';
        document.getElementById('createFormUrl').value = '';
        document.getElementById('createSpreadsheetId').value = '';
        document.getElementById('createScoreColumnHeader').value = '';
        document.getElementById('createError').style.display = 'none';
        document.getElementById('createModal').classList.add('open');
    }

    async function createForm() {
        const name              = document.getElementById('createName').value.trim();
        const trackId           = document.getElementById('createTrackId').value;
        const formUrl           = document.getElementById('createFormUrl').value.trim();
        const spreadsheetId     = document.getElementById('createSpreadsheetId').value.trim();
        const scoreColumnHeader = document.getElementById('createScoreColumnHeader').value.trim();
        const errEl             = document.getElementById('createError');
        errEl.style.display = 'none';

        if (!name)    { errEl.textContent = '폼 이름을 입력해주세요.';     errEl.style.display = 'block'; return; }
        if (!trackId) { errEl.textContent = '트랙을 선택해주세요.';         errEl.style.display = 'block'; return; }
        if (!formUrl) { errEl.textContent = '구글폼 URL을 입력해주세요.'; errEl.style.display = 'block'; return; }

        const res  = await fetch('/api/v1/admin/forms', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, trackId: parseInt(trackId), formUrl, spreadsheetId: spreadsheetId || null, scoreColumnHeader: scoreColumnHeader || null})
        });
        const data = await res.json();
        if (res.ok) {
            closeModal('createModal');
            await loadForms();
            if (spreadsheetId) showShareResult(data.data?.sharedWithServiceAccount, data.data?.serviceAccountEmail);
        } else { errEl.textContent = data.message || '등록에 실패했습니다.'; errEl.style.display = 'block'; }
    }

    // ── 수정 ──────────────────────────────────────
    function openEditModal(formId, name, trackId, formUrl, spreadsheetId, scoreColumnHeader) {
        document.getElementById('editFormId').value = formId;
        document.getElementById('editName').value = name;
        document.getElementById('editTrackId').value = trackId;
        document.getElementById('editFormUrl').value = formUrl;
        document.getElementById('editSpreadsheetId').value = spreadsheetId;
        document.getElementById('editScoreColumnHeader').value = scoreColumnHeader;
        document.getElementById('editError').style.display = 'none';
        document.getElementById('editModal').classList.add('open');
    }

    async function updateForm() {
        const formId            = document.getElementById('editFormId').value;
        const name              = document.getElementById('editName').value.trim();
        const trackId           = document.getElementById('editTrackId').value;
        const formUrl           = document.getElementById('editFormUrl').value.trim();
        const spreadsheetId     = document.getElementById('editSpreadsheetId').value.trim();
        const scoreColumnHeader = document.getElementById('editScoreColumnHeader').value.trim();
        const errEl             = document.getElementById('editError');
        errEl.style.display = 'none';

        if (!name)    { errEl.textContent = '폼 이름을 입력해주세요.';    errEl.style.display = 'block'; return; }
        if (!trackId) { errEl.textContent = '트랙을 선택해주세요.';        errEl.style.display = 'block'; return; }
        if (!formUrl) { errEl.textContent = '구글폼 URL을 입력해주세요.'; errEl.style.display = 'block'; return; }

        const res  = await fetch(`/api/v1/admin/forms/${formId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, trackId: parseInt(trackId), formUrl, spreadsheetId: spreadsheetId || null, scoreColumnHeader: scoreColumnHeader || null})
        });
        const data = await res.json();
        if (res.ok) {
            closeModal('editModal');
            await loadForms();
            if (spreadsheetId) showShareResult(data.data?.sharedWithServiceAccount, data.data?.serviceAccountEmail);
        } else { errEl.textContent = data.message || '수정에 실패했습니다.'; errEl.style.display = 'block'; }
    }

    // ── 삭제 ──────────────────────────────────────
    async function deleteForm(formId) {
        if (!confirm('구글폼을 삭제하시겠습니까?')) return;
        const res  = await fetch(`/api/v1/admin/forms/${formId}`, {method: 'DELETE'});
        const data = await res.json();
        if (res.ok) { await loadForms(); }
        else { alert(data.message || '삭제에 실패했습니다.'); }
    }

    // ── 공유 결과 토스트 ───────────────────────────
    function showShareResult(shared, email) {
        const msg = shared
            ? '스프레드시트에 서비스 계정을 뷰어로 자동 추가했습니다.'
            : `자동 공유에 실패했습니다. 스프레드시트에 ${email || '서비스 계정 이메일'}을(를) 뷰어로 직접 추가해주세요.`;
        const el = document.createElement('div');
        el.textContent = msg;
        el.style.cssText = `
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:${shared ? '#28A745' : '#DC3545'};color:#fff;
            padding:12px 24px;border-radius:8px;font-size:13px;
            box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;
            max-width:480px;text-align:center;line-height:1.5;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), shared ? 4000 : 8000);
    }

    function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    loadForms();
    loadServiceAccountEmail();
</script>
</body>
</html>
