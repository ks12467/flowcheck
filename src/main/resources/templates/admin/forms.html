<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('구글폼 관리')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>

    <main class="content-area">
        <div class="flex-between mb-16">
            <h1 class="page-title" style="margin-bottom:0">구글폼 관리</h1>
            <button class="btn btn-primary" onclick="openCreateModal()">+ 구글폼 등록</button>
        </div>

        <!-- 서비스 계정 이메일 배너 -->
        <div id="serviceAccountBanner" class="card" style="display:none;margin-bottom:16px;">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span style="font-size:13px;color:var(--text-muted);">서비스 계정 이메일 (스프레드시트 공유 시 필요)</span>
                <code id="serviceAccountEmail"
                      style="font-size:13px;background:var(--bg);padding:4px 10px;border-radius:6px;color:var(--text);flex:1;min-width:0;word-break:break-all;"></code>
                <button class="btn-copy" onclick="copyServiceEmail(this)">복사</button>
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
                스프레드시트 등록 시 자동으로 공유를 시도합니다. 실패 시 위 이메일을 스프레드시트에 <strong>뷰어</strong>로 직접 추가해주세요.
            </div>
        </div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>폼 이름</th>
                            <th>트랙</th>
                            <th>구글폼 URL</th>
                            <th>스프레드시트 ID</th>
                            <th>점수 컬럼</th>
                            <th style="width:140px;text-align:center;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="formTableBody">
                        <tr>
                            <td colspan="6" style="text-align:center;color:#6C757D;padding:32px;">
                                불러오는 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- ════════════════════════════════════════════
     구글폼 등록 모달
════════════════════════════════════════════ -->
<div class="modal-overlay" id="createModal" onclick="closeModal('createModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">구글폼 등록</h2>
            <button class="modal-close" onclick="closeModal('createModal')">×</button>
        </div>

        <div class="form-group">
            <label class="form-label">폼 이름 <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="createName" placeholder="예: 7기 만족도 설문">
        </div>
        <div class="form-group">
            <label class="form-label">트랙 <span class="text-danger">*</span></label>
            <div id="createTrackSelector"></div>
            <input type="hidden" id="createTrackId">
        </div>
        <div class="form-group">
            <label class="form-label">구글폼 URL <span class="text-danger">*</span></label>
            <input class="form-control" type="url" id="createFormUrl" placeholder="https://docs.google.com/forms/...">
        </div>
        <div class="form-group">
            <label class="form-label">스프레드시트 ID</label>
            <input class="form-control" type="text" id="createSpreadsheetId" placeholder="Google Sheets ID"
                   oninput="updateShareGuide('create')">
        </div>
        <div id="createShareGuide" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;">
            <div style="color:var(--text-muted);margin-bottom:8px;">
                ⚠️ 응답 수를 읽으려면 아래 이메일을 스프레드시트에 <strong>뷰어</strong>로 공유해주세요.
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <code id="createGuideEmail" style="flex:1;min-width:0;word-break:break-all;background:#fff;padding:4px 8px;border-radius:4px;border:1px solid var(--border);font-size:12px;"></code>
                <button type="button" class="btn-copy" onclick="copyGuideEmail('create', this)">복사</button>
                <button type="button" class="btn btn-outline" id="createOpenSheetBtn" style="padding:4px 12px;font-size:12px;"
                        onclick="openSpreadsheet('createSpreadsheetId')">스프레드시트 열기 →</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">만족도 점수 컬럼 헤더명</label>
            <input class="form-control" type="text" id="createScoreColumnHeader" placeholder="예: 만족도 점수">
        </div>

        <div id="createError" class="alert-error" style="display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('createModal')">취소</button>
            <button class="btn btn-primary" onclick="createForm()">등록</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════
     구글폼 수정 모달
════════════════════════════════════════════ -->
<div class="modal-overlay" id="editModal" onclick="closeModal('editModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">구글폼 수정</h2>
            <button class="modal-close" onclick="closeModal('editModal')">×</button>
        </div>

        <input type="hidden" id="editFormId">

        <div class="form-group">
            <label class="form-label">폼 이름 <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="editName">
        </div>
        <div class="form-group">
            <label class="form-label">트랙 <span class="text-danger">*</span></label>
            <div id="editTrackSelector"></div>
            <input type="hidden" id="editTrackId">
        </div>
        <div class="form-group">
            <label class="form-label">구글폼 URL <span class="text-danger">*</span></label>
            <input class="form-control" type="url" id="editFormUrl">
        </div>
        <div class="form-group">
            <label class="form-label">스프레드시트 ID</label>
            <input class="form-control" type="text" id="editSpreadsheetId"
                   oninput="updateShareGuide('edit')">
        </div>
        <div id="editShareGuide" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;">
            <div style="color:var(--text-muted);margin-bottom:8px;">
                ⚠️ 응답 수를 읽으려면 아래 이메일을 스프레드시트에 <strong>뷰어</strong>로 공유해주세요.
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <code id="editGuideEmail" style="flex:1;min-width:0;word-break:break-all;background:#fff;padding:4px 8px;border-radius:4px;border:1px solid var(--border);font-size:12px;"></code>
                <button type="button" class="btn-copy" onclick="copyGuideEmail('edit', this)">복사</button>
                <button type="button" class="btn btn-outline" id="editOpenSheetBtn" style="padding:4px 12px;font-size:12px;"
                        onclick="openSpreadsheet('editSpreadsheetId')">스프레드시트 열기 →</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">만족도 점수 컬럼 헤더명</label>
            <input class="form-control" type="text" id="editScoreColumnHeader">
        </div>

        <div id="editError" class="alert-error" style="display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">취소</button>
            <button class="btn btn-primary" onclick="updateForm()">저장</button>
        </div>
    </div>
</div>

<script>
    // ── 서비스 계정 이메일 (전역) ──────────────────
    let _serviceAccountEmail = '';

    // trackId → courseType 역방향 맵 (edit modal pre-selection 용)
    const _trackCourseTypeMap = {};

    // ── TrackSelector 초기화 ──────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        const courseTypes = await fetchCourseTypes();
        for (const ct of courseTypes) {
            const tracks = await fetchTracksByCourseType(ct);
            tracks.forEach(t => { _trackCourseTypeMap[String(t.trackId)] = ct; });
        }

        // 등록 모달 selector
        initTrackSelector({
            container: document.getElementById('createTrackSelector'),
            idPrefix: 'form-create',
            getCourseTypes: async () => courseTypes,
            getTracksByCourseType: fetchTracksByCourseType,
            onSelect(trackId) { document.getElementById('createTrackId').value = trackId; }
        });

        // 수정 모달 selector (pre-selection은 openEditModal에서 수행)
        initTrackSelector({
            container: document.getElementById('editTrackSelector'),
            idPrefix: 'form-edit',
            getCourseTypes: async () => courseTypes,
            getTracksByCourseType: fetchTracksByCourseType,
            onSelect(trackId) { document.getElementById('editTrackId').value = trackId; }
        });
    });

    async function loadServiceAccountEmail() {
        try {
            const res  = await fetch('/api/v1/admin/forms/service-account-email');
            const data = await res.json();
            const email = data.data?.email;
            if (email) {
                _serviceAccountEmail = email;
                document.getElementById('serviceAccountEmail').textContent = email;
                document.getElementById('serviceAccountBanner').style.display = 'block';
                // 모달 안내 이메일 초기 세팅
                document.getElementById('createGuideEmail').textContent = email;
                document.getElementById('editGuideEmail').textContent = email;
            }
        } catch (_) { /* 이메일 조회 실패 시 배너 미표시 */ }
    }

    // 스프레드시트 ID 입력 시 공유 안내 표시/숨김
    function updateShareGuide(prefix) {
        const id  = document.getElementById(prefix + 'SpreadsheetId').value.trim();
        const box = document.getElementById(prefix + 'ShareGuide');
        box.style.display = (id && _serviceAccountEmail) ? 'block' : 'none';
    }

    // 스프레드시트를 새 탭에서 열기
    function openSpreadsheet(inputId) {
        const id = document.getElementById(inputId).value.trim();
        if (!id) return;
        window.open('https://docs.google.com/spreadsheets/d/' + encodeURIComponent(id), '_blank', 'noopener');
    }

    function copyText(text, btn) {
        try {
            navigator.clipboard.writeText(text);
        } catch (_) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
    }

    function copyServiceEmail(btn) {
        copyText(document.getElementById('serviceAccountEmail').textContent, btn);
    }

    function copyGuideEmail(prefix, btn) {
        copyText(_serviceAccountEmail, btn);
    }

    // ── 폼 목록 로드 ───────────────────────────────
    async function loadForms() {
        const res  = await fetch('/api/v1/admin/forms');
        const data = await res.json();
        renderForms(data.data || []);
    }

    function renderForms(forms) {
        const tbody = document.getElementById('formTableBody');
        if (forms.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6C757D;padding:32px;">등록된 구글폼이 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = forms.map(f => `
            <tr>
                <td style="font-weight:600;">${esc(f.name)}</td>
                <td class="text-muted">${esc(f.trackName)}</td>
                <td>
                    <a href="${esc(f.formUrl)}" target="_blank" rel="noopener"
                       style="color:var(--primary);font-size:12px;word-break:break-all;"
                       title="${esc(f.formUrl)}">
                        ${esc(f.formUrl.length > 40 ? f.formUrl.slice(0, 40) + '...' : f.formUrl)}
                    </a>
                </td>
                <td class="text-muted" style="font-size:12px;">${esc(f.spreadsheetId || '-')}</td>
                <td class="text-muted" style="font-size:12px;">${esc(f.scoreColumnHeader || '-')}</td>
                <td style="text-align:center;">
                    <button class="btn btn-outline" style="padding:4px 10px;font-size:12px;"
                            onclick="openEditModal(${f.formId},'${esc(f.name)}',${f.trackId},'${esc(f.formUrl)}','${esc(f.spreadsheetId||'')}','${esc(f.scoreColumnHeader||'')}')">수정</button>
                    <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;margin-left:4px;"
                            onclick="deleteForm(${f.formId})">삭제</button>
                </td>
            </tr>
        `).join('');
    }

    // ── 모달 공통 ──────────────────────────────────
    function closeModal(id, e) {
        if (e && e.target !== document.getElementById(id)) return;
        document.getElementById(id).classList.remove('open');
    }

    // ── 등록 ──────────────────────────────────────
    function openCreateModal() {
        document.getElementById('createName').value = '';
        document.getElementById('createTrackId').value = '';
        document.getElementById('createFormUrl').value = '';
        document.getElementById('createSpreadsheetId').value = '';
        document.getElementById('createScoreColumnHeader').value = '';
        document.getElementById('createError').style.display = 'none';
        document.getElementById('createShareGuide').style.display = 'none';
        // 선택 초기화: ts-radio 모두 해제, ts-track-row 숨김
        document.querySelectorAll('#createTrackSelector [data-ts-radio]').forEach(r => r.checked = false);
        document.querySelectorAll('#createTrackSelector [data-ts-label]').forEach(l => l.classList.remove('ts-pill-active'));
        const row = document.querySelector('#createTrackSelector .ts-track-row');
        if (row) row.style.display = 'none';
        document.getElementById('createModal').classList.add('open');
    }

    async function createForm() {
        const name              = document.getElementById('createName').value.trim();
        const trackId           = document.getElementById('createTrackId').value;
        const formUrl           = document.getElementById('createFormUrl').value.trim();
        const spreadsheetId     = document.getElementById('createSpreadsheetId').value.trim();
        const scoreColumnHeader = document.getElementById('createScoreColumnHeader').value.trim();
        const errEl             = document.getElementById('createError');
        errEl.style.display = 'none';

        if (!name)    { errEl.textContent = '폼 이름을 입력해주세요.';     errEl.style.display = 'block'; return; }
        if (!trackId) { errEl.textContent = '트랙을 선택해주세요.';         errEl.style.display = 'block'; return; }
        if (!formUrl) { errEl.textContent = '구글폼 URL을 입력해주세요.'; errEl.style.display = 'block'; return; }

        const res  = await fetch('/api/v1/admin/forms', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, trackId: parseInt(trackId), formUrl, spreadsheetId: spreadsheetId || null, scoreColumnHeader: scoreColumnHeader || null})
        });
        const data = await res.json();
        if (res.ok) {
            closeModal('createModal');
            await loadForms();
            if (spreadsheetId) showShareResult(data.data?.shareResult, data.data?.serviceAccountEmail, spreadsheetId);
        } else { errEl.textContent = data.message || '등록에 실패했습니다.'; errEl.style.display = 'block'; }
    }

    // ── 수정 ──────────────────────────────────────
    function openEditModal(formId, name, trackId, formUrl, spreadsheetId, scoreColumnHeader) {
        document.getElementById('editFormId').value = formId;
        document.getElementById('editName').value = name;
        document.getElementById('editTrackId').value = trackId;
        document.getElementById('editFormUrl').value = formUrl;
        document.getElementById('editSpreadsheetId').value = spreadsheetId;
        document.getElementById('editScoreColumnHeader').value = scoreColumnHeader;
        document.getElementById('editError').style.display = 'none';
        // 스프레드시트 ID가 있으면 공유 안내 즉시 표시
        const guide = document.getElementById('editShareGuide');
        guide.style.display = (spreadsheetId && _serviceAccountEmail) ? 'block' : 'none';
        // 트랙 selector 사전 선택
        const courseType = _trackCourseTypeMap[String(trackId)];
        if (courseType) {
            preselectTrackSelector(
                document.getElementById('editTrackSelector'),
                courseType, trackId, fetchTracksByCourseType
            );
        }
        document.getElementById('editModal').classList.add('open');
    }

    async function updateForm() {
        const formId            = document.getElementById('editFormId').value;
        const name              = document.getElementById('editName').value.trim();
        const trackId           = document.getElementById('editTrackId').value;
        const formUrl           = document.getElementById('editFormUrl').value.trim();
        const spreadsheetId     = document.getElementById('editSpreadsheetId').value.trim();
        const scoreColumnHeader = document.getElementById('editScoreColumnHeader').value.trim();
        const errEl             = document.getElementById('editError');
        errEl.style.display = 'none';

        if (!name)    { errEl.textContent = '폼 이름을 입력해주세요.';    errEl.style.display = 'block'; return; }
        if (!trackId) { errEl.textContent = '트랙을 선택해주세요.';        errEl.style.display = 'block'; return; }
        if (!formUrl) { errEl.textContent = '구글폼 URL을 입력해주세요.'; errEl.style.display = 'block'; return; }

        const res  = await fetch(`/api/v1/admin/forms/${formId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, trackId: parseInt(trackId), formUrl, spreadsheetId: spreadsheetId || null, scoreColumnHeader: scoreColumnHeader || null})
        });
        const data = await res.json();
        if (res.ok) {
            closeModal('editModal');
            await loadForms();
            if (spreadsheetId) showShareResult(data.data?.shareResult, data.data?.serviceAccountEmail, spreadsheetId);
        } else { errEl.textContent = data.message || '수정에 실패했습니다.'; errEl.style.display = 'block'; }
    }

    // ── 삭제 ──────────────────────────────────────
    async function deleteForm(formId) {
        if (!confirm('구글폼을 삭제하시겠습니까?')) return;
        const res  = await fetch(`/api/v1/admin/forms/${formId}`, {method: 'DELETE'});
        const data = await res.json();
        if (res.ok) { await loadForms(); }
        else { alert(data.message || '삭제에 실패했습니다.'); }
    }

    // ── 공유 결과 알림 ─────────────────────────────
    function showShareResult(shareResult, email, spreadsheetId) {
        const el = document.createElement('div');

        if (shareResult === true) {
            el.style.cssText = `
                position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
                background:#28A745;color:#fff;
                padding:14px 20px;border-radius:10px;font-size:13px;
                box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;
                max-width:520px;width:calc(100% - 48px);line-height:1.6;
            `;
            el.textContent = '✅ 스프레드시트 공유 완료! 응답 수 조회가 가능합니다.';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        } else {
            const displayEmail = email || _serviceAccountEmail || '서비스 계정 이메일';
            el.style.cssText = `
                position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
                background:#856404;color:#fff3cd;border:1px solid #ffc107;
                padding:14px 20px;border-radius:10px;font-size:13px;
                box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;
                max-width:520px;width:calc(100% - 48px);line-height:1.6;
            `;
            el.innerHTML = `
                <div style="font-weight:600;margin-bottom:8px;color:#fff3cd;">⚠️ 자동 공유 실패</div>
                <div style="font-size:12px;margin-bottom:10px;color:#fff3cd;">
                    아래 이메일을 스프레드시트에 <strong>뷰어</strong>로 수동 추가해주세요.
                </div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
                    <code id="shareToastEmail" style="flex:1;min-width:0;word-break:break-all;background:rgba(0,0,0,.2);
                          padding:4px 8px;border-radius:4px;font-size:12px;color:#fff3cd;">${esc(displayEmail)}</code>
                    <button onclick="copyToastEmail(this)" style="border:1px solid rgba(255,255,255,.5);background:transparent;color:#fff3cd;
                            padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap;">복사</button>
                </div>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    ${spreadsheetId ? `<button onclick="window.open('https://docs.google.com/spreadsheets/d/${encodeURIComponent(spreadsheetId)}','_blank','noopener');this.closest('[style]').remove();"
                            style="border:none;background:rgba(0,0,0,.2);color:#fff3cd;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;">
                            스프레드시트 열기 →</button>` : ''}
                    <button onclick="this.closest('[style]').remove();"
                            style="border:none;background:rgba(0,0,0,.15);color:#fff3cd;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;">닫기</button>
                </div>
            `;
            document.body.appendChild(el);
            // 15초 후 자동 닫힘
            setTimeout(() => { if (el.parentNode) el.remove(); }, 15000);
        }
    }

    function copyToastEmail(btn) {
        copyText(document.getElementById('shareToastEmail').textContent, btn);
    }

    function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    loadForms();
    loadServiceAccountEmail();
</script>
</body>
</html>
