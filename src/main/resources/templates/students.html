<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('수강생 목록')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>

    <main class="content-area">
        <div class="flex-between mb-16">
            <div>
                <h1 class="page-title" style="margin-bottom:0" th:text="${track.name}">트랙명</h1>
                <div class="page-subtitle">수강생 목록</div>
            </div>
        </div>

        <div class="card">
            <!-- 검색 -->
            <form method="get" th:action="@{/tracks/{id}/students(id=${track.id})}" class="search-bar">
                <input type="hidden" name="riskLevel" th:value="${selectedRiskLevel}">
                <input class="form-control" type="text" name="keyword"
                       placeholder="이름 또는 이메일 검색"
                       th:value="${keyword}">
                <button class="btn btn-primary" type="submit">검색</button>
                <a th:href="@{/tracks/{id}/students(id=${track.id})}" class="btn btn-outline">초기화</a>
            </form>

            <!-- 위험군 필터 -->
            <div class="filter-group">
                <a th:href="@{/tracks/{id}/students(id=${track.id}, keyword=${keyword})}"
                   class="btn btn-outline" th:classappend="${selectedRiskLevel == null} ? 'active' : ''">전체</a>
                <a th:href="@{/tracks/{id}/students(id=${track.id}, riskLevel='즉시면담', keyword=${keyword})}"
                   class="btn btn-outline" th:classappend="${selectedRiskLevel == '즉시면담'} ? 'active' : ''"
                   style="color:#DC3545; border-color:#DC3545;">🚨 즉시면담</a>
                <a th:href="@{/tracks/{id}/students(id=${track.id}, riskLevel='주의', keyword=${keyword})}"
                   class="btn btn-outline" th:classappend="${selectedRiskLevel == '주의'} ? 'active' : ''"
                   style="color:#FD7E14; border-color:#FD7E14;">⚠️ 주의</a>
                <a th:href="@{/tracks/{id}/students(id=${track.id}, riskLevel='관찰', keyword=${keyword})}"
                   class="btn btn-outline" th:classappend="${selectedRiskLevel == '관찰'} ? 'active' : ''"
                   style="color:#B8860B; border-color:#FFC107;">👀 관찰</a>
                <a th:href="@{/tracks/{id}/students(id=${track.id}, riskLevel='정상', keyword=${keyword})}"
                   class="btn btn-outline" th:classappend="${selectedRiskLevel == '정상'} ? 'active' : ''"
                   style="color:#28A745; border-color:#28A745;">✅ 정상</a>
            </div>

            <!-- 수강생 테이블 -->
            <div class="table-wrap">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th class="th-sortable" onclick="sortTable('name')" style="cursor:pointer;">
                                이름 <span class="sort-icon" id="sort-icon-name"></span>
                            </th>
                            <th>이메일</th>
                            <th>연락처</th>
                            <th class="th-sortable" onclick="sortTable('risk')" style="cursor:pointer;">
                                위험군 <span class="sort-icon" id="sort-icon-risk"></span>
                            </th>
                            <th>최근 난이도</th>
                            <th>최근 제출일</th>
                            <th class="th-sortable" onclick="sortTable('today')" style="cursor:pointer;">
                                오늘 제출 <span class="sort-icon" id="sort-icon-today"></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="studentTbody">
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="7" style="text-align:center;color:#6C757D;padding:32px;">
                                수강생이 없습니다.
                            </td>
                        </tr>
                        <tr th:each="s : ${students}"
                            class="clickable"
                            th:onclick="|location.href='/tracks/${track.id}/students/${s.studentId}'|"
                            th:attr="data-name=${s.name}, data-risk=${s.riskLevel}, data-today=${s.submittedToday ? '1' : '0'}">
                            <td style="font-weight:600;" th:text="${s.name}">이름</td>
                            <td class="text-muted" th:text="${s.email ?: '-'}">이메일</td>
                            <td class="text-muted" th:text="${s.phone ?: '-'}">연락처</td>
                            <td>
                                <span th:if="${s.riskLevel == '즉시면담'}" class="badge badge-danger">즉시면담</span>
                                <span th:if="${s.riskLevel == '주의'}"    class="badge badge-warning">주의</span>
                                <span th:if="${s.riskLevel == '관찰'}"    class="badge badge-caution">관찰</span>
                                <span th:if="${s.riskLevel == '정상'}"    class="badge badge-success">정상</span>
                                <span th:if="${s.riskLevel == null}"      class="badge badge-none">미제출</span>
                            </td>
                            <td>
                                <span th:if="${s.conditionScore != null}"
                                      th:text="${s.conditionScore} + '점'">점수</span>
                                <span th:if="${s.conditionScore == null}" class="text-muted">-</span>
                            </td>
                            <td class="text-muted">
                                <span th:if="${s.submittedAt != null}"
                                      th:text="${#temporals.format(s.submittedAt, 'MM/dd HH:mm')}">날짜</span>
                                <span th:if="${s.submittedAt == null}">-</span>
                            </td>
                            <td style="text-align:center;font-size:16px;">
                                <span th:if="${s.submittedToday}">✅</span>
                                <span th:unless="${s.submittedToday}">⬜</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

<style>
.th-sortable:hover { background: var(--bg); color: var(--primary); }
.sort-icon { font-size: 10px; color: var(--text-muted); margin-left: 2px; }
</style>

<script>
(function () {
    const RISK_ORDER = { '즉시면담': 1, '주의': 2, '관찰': 3, '정상': 4 };
    const sortState = { col: null, asc: true };

    window.sortTable = function (col) {
        if (sortState.col === col) {
            sortState.asc = !sortState.asc;
        } else {
            sortState.col = col;
            sortState.asc = true;
        }
        updateSortIcons();

        const tbody = document.getElementById('studentTbody');
        const rows = Array.from(tbody.querySelectorAll('tr[data-name]'));

        rows.sort((a, b) => {
            let av, bv;
            if (col === 'name') {
                av = a.dataset.name ?? '';
                bv = b.dataset.name ?? '';
                return sortState.asc ? av.localeCompare(bv, 'ko') : bv.localeCompare(av, 'ko');
            } else if (col === 'risk') {
                av = RISK_ORDER[a.dataset.risk] ?? 5;
                bv = RISK_ORDER[b.dataset.risk] ?? 5;
            } else if (col === 'today') {
                av = parseInt(a.dataset.today ?? '0');
                bv = parseInt(b.dataset.today ?? '0');
            }
            return sortState.asc ? av - bv : bv - av;
        });

        rows.forEach(r => tbody.appendChild(r));
    };

    function updateSortIcons() {
        ['name', 'risk', 'today'].forEach(c => {
            const el = document.getElementById('sort-icon-' + c);
            if (!el) return;
            if (sortState.col === c) {
                el.textContent = sortState.asc ? '▲' : '▼';
            } else {
                el.textContent = '';
            }
        });
    }
})();
</script>
        </div>
    </main>
</div>
</body>
</html>
