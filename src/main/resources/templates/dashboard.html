<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('대시보드')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>

    <main class="content-area">
        <div class="flex-between mb-16">
            <div>
                <h1 class="page-title" style="margin-bottom:0">대시보드</h1>
                <div class="page-subtitle" th:text="'오늘도 수강생들의 학습을 응원해요, ' + ${pm?.name} + ' PM'"></div>
            </div>
        </div>

        <!-- 즉시면담 수강생 -->
        <div class="card">
            <div class="card-title" style="color:#DC3545;">🚨 즉시면담 필요 수강생</div>
            <div class="urgent-cards" th:if="${!#lists.isEmpty(urgentStudents)}">
                <div class="urgent-card"
                     th:each="lp : ${urgentStudents}"
                     th:onclick="|location.href='/tracks/${lp.student.track.id}/students/${lp.student.id}'|">
                    <div class="urgent-card-name" th:text="${lp.student.name}">이름</div>
                    <div class="urgent-card-track" th:text="${lp.student.track.name}">트랙명</div>
                    <div class="mt-4" style="font-size:12px;color:#DC3545;"
                         th:text="'난이도 ' + ${lp.conditionScore} + '점'">난이도</div>
                </div>
            </div>
            <div class="urgent-empty" th:if="${#lists.isEmpty(urgentStudents)}">
                즉시면담이 필요한 수강생이 없습니다.
            </div>
        </div>

        <div class="grid-2">
            <!-- 트랙별 오늘 제출 현황 -->
            <div class="card">
                <div class="card-title">📋 트랙별 오늘 제출 현황</div>
                <div th:if="${#lists.isEmpty(trackStats)}" class="text-muted" style="font-size:13px;">
                    배정된 트랙이 없습니다.
                </div>
                <div th:each="stat : ${trackStats}" class="progress-bar-wrap">
                    <div class="progress-bar-label">
                        <span th:text="${stat.trackName}">트랙</span>
                        <span style="color:#6C757D;"
                              th:text="${stat.todayCount} + ' / ' + ${stat.totalStudents} + '명'">0 / 0명</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill"
                             th:style="${stat.totalStudents > 0}
                                ? 'width:' + (${stat.todayCount} * 100 / ${stat.totalStudents}) + '%'
                                : 'width:0%'"></div>
                    </div>
                </div>
            </div>

            <!-- 난이도 분포 차트 -->
            <div class="card">
                <div class="card-title">📈 수강생 난이도 분포</div>
                <canvas id="conditionChart" height="180"></canvas>
            </div>
        </div>

        <!-- 구글폼 응답 현황 -->
        <div class="card">
            <div class="card-title">📝 구글폼 응답 현황</div>
            <div id="gfEmptyMsg" class="text-muted" style="font-size:13px;display:none;">
                연결된 구글폼이 없습니다.
            </div>
            <div id="gfContent">
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
                    <select id="gfTrackSelect" class="form-control" style="max-width:220px;"
                            onchange="onGfTrackChange()">
                        <option value="">트랙 선택</option>
                    </select>
                    <select id="gfFormSelect" class="form-control" style="max-width:240px;"
                            onchange="onGfFormChange()" disabled>
                        <option value="">폼 선택</option>
                    </select>
                </div>
                <div id="gfStats" style="display:none;">
                    <div class="grid-2" style="gap:12px;margin-bottom:12px;">
                        <!-- 좌: 만족도 평균(조건부) + 총 응답 수 -->
                        <div class="card" style="margin-bottom:0;text-align:center;">
                            <div id="gfScoreSection" style="display:none;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">
                                <div style="display:flex;align-items:flex-end;justify-content:center;gap:6px;">
                                    <div style="font-size:36px;font-weight:700;color:var(--primary);line-height:1;" id="gfAvgScore">-</div>
                                    <span id="gfScoreDelta" style="display:none;font-size:11px;font-weight:700;margin-bottom:4px;"></span>
                                </div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:4px;" id="gfScoreLabel">만족도 평균</div>
                            </div>
                            <div style="font-size:28px;font-weight:700;color:var(--primary);" id="gfResponseCount">-</div>
                            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">총 응답 수</div>
                        </div>
                        <!-- 우: 시트 바로가기(조건부) + 총원 -->
                        <div class="card" style="margin-bottom:0;text-align:center;">
                            <div id="gfSheetLink" style="display:none;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">
                                <a id="gfSheetAnchor" href="#" target="_blank" rel="noopener"
                                   style="font-size:13px;color:var(--primary);font-weight:500;">
                                    📊 시트 바로가기 →
                                </a>
                            </div>
                            <div style="font-size:28px;font-weight:700;color:var(--primary);" id="gfTotalStudents">-</div>
                            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">총원</div>
                        </div>
                    </div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-label">
                            <span>제출률</span>
                            <span id="gfRate" style="font-weight:600;color:var(--primary);">-</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-bar-fill" id="gfRateBar"
                                 style="width:0%;background:var(--success);transition:width .5s;"></div>
                        </div>
                    </div>
                </div>
                <div id="gfSelectMsg" class="text-muted" style="font-size:13px;">
                    트랙과 구글폼을 선택하면 현황이 표시됩니다.
                </div>
            </div>
        </div>

        <!-- 수강생 설문 제출 링크 -->
        <div class="card">
            <div class="card-title">🔗 수강생 설문 제출 링크</div>
            <div th:if="${#lists.isEmpty(trackStats)}" class="text-muted" style="font-size:13px;">
                배정된 트랙이 없습니다.
            </div>
            <div th:each="stat : ${trackStats}" class="survey-link-row">
                <div class="survey-link-label" th:text="${stat.trackName}">트랙명</div>
                <div class="survey-link-url"
                     th:text="${baseUrl + '/progress/' + stat.trackId}">
                    URL
                </div>
                <button class="btn-copy"
                        th:attr="data-url=${baseUrl + '/progress/' + stat.trackId}"
                        onclick="copyLink(this)">
                    복사
                </button>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    (function() {
        const forms = /*[[${googleForms}]]*/ [];
        const stats = /*[[${trackStats}]]*/ [];

        if (forms.length === 0) {
            document.getElementById('gfEmptyMsg').style.display = 'block';
            document.getElementById('gfContent').style.display = 'none';
            return;
        }

        // 트랙 드롭다운 채우기 (폼이 있는 트랙만)
        const trackIds = [...new Set(forms.map(f => f.trackId))];
        const trackSelect = document.getElementById('gfTrackSelect');
        stats.filter(s => trackIds.includes(s.trackId)).forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.trackId;
            opt.textContent = s.trackName;
            opt.dataset.students = s.totalStudents;
            trackSelect.appendChild(opt);
        });

        window.onGfTrackChange = function() {
            const trackId = parseInt(trackSelect.value);
            const formSelect = document.getElementById('gfFormSelect');
            formSelect.innerHTML = '<option value="">폼 선택</option>';
            document.getElementById('gfStats').style.display = 'none';
            document.getElementById('gfSelectMsg').style.display = 'block';

            if (!trackId) { formSelect.disabled = true; return; }

            formSelect.disabled = false;
            forms.filter(f => f.trackId === trackId).forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.formId;
                opt.textContent = f.name;
                formSelect.appendChild(opt);
            });
        };

        // 세션 내 이전 평균 점수 저장 (formId → 마지막 조회값)
        const prevScores = {};

        window.onGfFormChange = async function() {
            const trackOpt = trackSelect.options[trackSelect.selectedIndex];
            const formId   = document.getElementById('gfFormSelect').value;
            if (!formId) {
                document.getElementById('gfStats').style.display = 'none';
                document.getElementById('gfSelectMsg').style.display = 'block';
                return;
            }

            // 선택된 폼 메타 (spreadsheetId, scoreColumnHeader)
            const form = forms.find(f => String(f.formId) === String(formId));

            // 시트 바로가기
            if (form?.spreadsheetId) {
                document.getElementById('gfSheetAnchor').href =
                    'https://docs.google.com/spreadsheets/d/' + encodeURIComponent(form.spreadsheetId);
                document.getElementById('gfSheetLink').style.display = 'block';
            } else {
                document.getElementById('gfSheetLink').style.display = 'none';
            }

            // 만족도 평균 섹션 표시 여부
            if (form?.scoreColumnHeader) {
                document.getElementById('gfScoreLabel').textContent = form.scoreColumnHeader + ' 평균';
                document.getElementById('gfScoreSection').style.display = 'block';
                document.getElementById('gfAvgScore').textContent = '…';
                document.getElementById('gfScoreDelta').style.display = 'none';
            } else {
                document.getElementById('gfScoreSection').style.display = 'none';
            }

            const total = parseInt(trackOpt.dataset.students) || 0;
            document.getElementById('gfSelectMsg').style.display = 'none';
            document.getElementById('gfStats').style.display = 'block';
            document.getElementById('gfResponseCount').textContent = '조회 중…';
            document.getElementById('gfTotalStudents').textContent = total + '명';
            document.getElementById('gfRate').textContent = '-';
            document.getElementById('gfRateBar').style.width = '0%';

            try {
                const res  = await fetch(`/api/v1/admin/forms/${formId}/responses`);
                const data = await res.json();
                const count    = data.data?.responseCount ?? -1;
                const avgScore = data.data?.averageScore ?? null;

                // 응답 수 & 제출률
                if (count < 0) {
                    document.getElementById('gfResponseCount').textContent = '연동 오류';
                    document.getElementById('gfRate').textContent = 'credentials.json 확인 필요';
                } else {
                    document.getElementById('gfResponseCount').textContent = count + '건';
                    const pct = total > 0 ? Math.min(100, Math.round(count / total * 100)) : 0;
                    document.getElementById('gfRate').textContent = pct + '%  (' + count + ' / ' + total + '명)';
                    document.getElementById('gfRateBar').style.width = pct + '%';
                }

                // 만족도 평균 & 델타
                if (form?.scoreColumnHeader) {
                    if (avgScore !== null && avgScore !== undefined) {
                        document.getElementById('gfAvgScore').textContent = avgScore.toFixed(1);

                        const prev = prevScores[formId];
                        const deltaEl = document.getElementById('gfScoreDelta');
                        if (prev !== undefined) {
                            const delta = Math.round((avgScore - prev) * 10) / 10;
                            if (delta !== 0) {
                                deltaEl.textContent = (delta > 0 ? '+' : '') + delta;
                                deltaEl.style.color = delta > 0 ? 'var(--success)' : 'var(--danger)';
                                deltaEl.style.display = 'inline';
                            } else {
                                deltaEl.style.display = 'none';
                            }
                        }
                        prevScores[formId] = avgScore;
                    } else {
                        document.getElementById('gfAvgScore').textContent = '-';
                    }
                }
            } catch (e) {
                document.getElementById('gfResponseCount').textContent = '오류';
                document.getElementById('gfRate').textContent = '서버 오류';
            }
        };
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    async function copyLink(btn) {
        const text = btn.getAttribute('data-url');

        function markCopied() {
            btn.textContent = '복사됨!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '복사';
                btn.classList.remove('copied');
            }, 2000);
        }

        try {
            await navigator.clipboard.writeText(text);
            markCopied();
        } catch {
            // HTTP 환경 등 Clipboard API 미지원 시 fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            markCopied();
        }
    }
</script>
<script th:inline="javascript">
    const counts = /*[[${conditionCounts}]]*/ [0,0,0,0,0];
    const ctx = document.getElementById('conditionChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['1점 (쉬움)', '2점', '3점 (보통)', '4점', '5점 (어려움)'],
            datasets: [{
                label: '수강생 수',
                data: counts,
                backgroundColor: ['#28A745','#8BC34A','#FFC107','#FD7E14','#DC3545'],
                borderRadius: 6,
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });
</script>
</body>
</html>
