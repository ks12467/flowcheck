<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- HEAD 프래그먼트 -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - FlowCheck'">FlowCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/track-selector.js}"></script>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/favicon-192x192.png}">
</head>

<!-- 상단 네비게이션 바 프래그먼트 -->
<nav class="topnav" th:fragment="sidebar">
    <div class="topnav-inner">

        <!-- 로고 -->
        <a class="topnav-logo" th:href="@{/dashboard}">FlowCheck</a>

        <!-- 메뉴 -->
        <ul class="topnav-menu">
            <li>
                <a th:href="@{/dashboard}" class="topnav-item">대시보드</a>
            </li>

            <!-- 운영 관리 드롭다운 (트랙 관리 / PM 관리만) -->
            <li class="topnav-dropdown">
                <button type="button" class="topnav-item topnav-dropdown-btn">
                    운영 관리 <span class="topnav-arrow">▾</span>
                </button>
                <ul class="topnav-submenu">
                    <li><a th:href="@{/admin/tracks}" class="topnav-subitem">트랙 관리</a></li>
                    <li><a th:href="@{/admin/pms}"    class="topnav-subitem">PM 관리</a></li>
                </ul>
            </li>

            <!-- 삭제 데이터 (ADMIN 전용) — TODO: 테스트 후 원복: pm != null and pm.role == 'ADMIN' 조건 복원 -->
            <li th:if="${pm == null or pm.role == 'ADMIN'}">
                <a th:href="@{/admin/deleted}" class="topnav-item">삭제 데이터</a>
            </li>

            <!-- 배정된 트랙별 드롭다운 -->
            <th:block th:if="${sidebarTracks != null and !#lists.isEmpty(sidebarTracks)}">
                <li class="topnav-divider"></li>
                <li class="topnav-dropdown" th:each="t : ${sidebarTracks}">
                    <button type="button" class="topnav-item topnav-dropdown-btn"
                            th:attr="data-track-id=${t.id}">
                        <span th:text="${t.name}">트랙명</span> <span class="topnav-arrow">▾</span>
                    </button>
                    <ul class="topnav-submenu">
                        <li><a th:href="@{/admin/students(trackId=${t.id})}"    class="topnav-subitem">수강생 관리</a></li>
                        <li><a th:href="@{/admin/forms(trackId=${t.id})}"       class="topnav-subitem">구글폼 관리</a></li>
                        <li><a th:href="@{/admin/nps(trackId=${t.id})}"         class="topnav-subitem">NPS 분석</a></li>
                        <li><a th:href="@{/admin/satisfaction(trackId=${t.id})}" class="topnav-subitem">만족도 분석</a></li>
                    </ul>
                </li>
            </th:block>
        </ul>

        <!-- 우측: PM 이름 + 로그아웃 -->
        <!-- TODO: 테스트 후 원복 — th:if="${pm != null}" 조건 복원, 테스트 PM span 제거 -->
        <div class="topnav-right">
            <span class="topnav-pm"
                  th:text="${pm != null ? pm.name + ' PM' : '테스트 PM'}"
                  th:style="${pm == null ? 'opacity:.65;' : ''}"></span>
            <a th:href="@{/logout}" class="topnav-logout">로그아웃</a>
        </div>

        <!-- 모바일 햄버거 -->
        <button type="button" class="topnav-hamburger" id="topnavHamburger" aria-label="메뉴 열기">☰</button>
    </div>

    <!-- 모바일 드로어 -->
    <div class="topnav-drawer" id="topnavDrawer">
        <ul class="topnav-drawer-menu">
            <li><a th:href="@{/dashboard}" class="topnav-drawer-item">대시보드</a></li>
            <li class="topnav-drawer-section">운영 관리</li>
            <li><a th:href="@{/admin/tracks}" class="topnav-drawer-item topnav-drawer-sub">트랙 관리</a></li>
            <li><a th:href="@{/admin/pms}"    class="topnav-drawer-item topnav-drawer-sub">PM 관리</a></li>
            <!-- TODO: 테스트 후 원복: pm != null and pm.role == 'ADMIN' 조건 복원 -->
            <li th:if="${pm == null or pm.role == 'ADMIN'}">
                <a th:href="@{/admin/deleted}" class="topnav-drawer-item">삭제 데이터</a>
            </li>
            <th:block th:if="${sidebarTracks != null and !#lists.isEmpty(sidebarTracks)}">
                <th:block th:each="t : ${sidebarTracks}">
                    <li class="topnav-drawer-section" th:text="${t.name}">트랙명</li>
                    <li><a th:href="@{/admin/students(trackId=${t.id})}"     class="topnav-drawer-item topnav-drawer-sub">수강생 관리</a></li>
                    <li><a th:href="@{/admin/forms(trackId=${t.id})}"        class="topnav-drawer-item topnav-drawer-sub">구글폼 관리</a></li>
                    <li><a th:href="@{/admin/nps(trackId=${t.id})}"          class="topnav-drawer-item topnav-drawer-sub">NPS 분석</a></li>
                    <li><a th:href="@{/admin/satisfaction(trackId=${t.id})}" class="topnav-drawer-item topnav-drawer-sub">만족도 분석</a></li>
                </th:block>
            </th:block>
            <!-- TODO: 테스트 후 원복 — th:if="${pm != null}" 조건 복원, 테스트 PM span 제거 -->
            <li>
                <div class="topnav-drawer-footer">
                    <span th:if="${pm != null}" th:text="${pm.name} + ' PM'"></span>
                    <span th:if="${pm == null}" style="opacity:.65;">테스트 PM</span>
                    <a th:href="@{/logout}" class="topnav-logout" style="margin-left:auto;">로그아웃</a>
                </div>
            </li>
        </ul>
    </div>

    <script>
        (function () {
            const path = location.pathname;
            const urlParams = new URLSearchParams(location.search);
            const activeTrackId = urlParams.get('trackId');

            // ── 활성 탭 하이라이트 ──────────────────────
            const mgmtPaths = ['/admin/tracks', '/admin/pms'];
            const trackAdminPaths = ['/admin/students', '/admin/forms', '/admin/nps', '/admin/satisfaction'];
            const isManagement = mgmtPaths.some(p => path.startsWith(p));
            const isTrackAdmin = trackAdminPaths.some(p => path.startsWith(p));

            // 대시보드 등 일반 링크 활성화
            document.querySelectorAll('.topnav-item[href]').forEach(el => {
                const href = el.getAttribute('href');
                if (!href) return;
                if (href === '/dashboard' ? path === '/dashboard' : path.startsWith(href)) {
                    el.classList.add('active');
                }
            });

            // 서브메뉴 항목 활성화
            document.querySelectorAll('.topnav-subitem[href]').forEach(el => {
                const href = el.getAttribute('href');
                if (!href) return;
                const hrefPath   = href.split('?')[0];
                const hrefSearch = href.includes('?') ? href.split('?')[1] : '';
                const hrefTrackId = new URLSearchParams(hrefSearch).get('trackId');

                if (hrefTrackId) {
                    // 트랙별 서브메뉴: path + trackId 모두 일치할 때
                    if (path === hrefPath && activeTrackId === hrefTrackId) {
                        el.classList.add('active');
                    }
                } else {
                    // 운영 관리 서브메뉴 (트랙ID 없는 단순 경로)
                    if (path.startsWith(href)) {
                        el.classList.add('active');
                    }
                }
            });

            // 운영 관리 드롭다운 버튼 활성화
            if (isManagement) {
                document.querySelector('.topnav-dropdown-btn:not([data-track-id])')?.classList.add('active');
            }

            // 트랙별 드롭다운 버튼 활성화
            if (isTrackAdmin && activeTrackId) {
                document.querySelectorAll('.topnav-dropdown-btn[data-track-id]').forEach(btn => {
                    if (String(btn.dataset.trackId) === activeTrackId) {
                        btn.classList.add('active');
                    }
                });
            }

            // 드로어에서도 활성 표시
            document.querySelectorAll('.topnav-drawer-item[href]').forEach(el => {
                const href = el.getAttribute('href');
                if (!href) return;
                const hrefPath   = href.split('?')[0];
                const hrefSearch = href.includes('?') ? href.split('?')[1] : '';
                const hrefTrackId = new URLSearchParams(hrefSearch).get('trackId');

                if (hrefTrackId) {
                    if (path === hrefPath && activeTrackId === hrefTrackId) {
                        el.classList.add('active');
                    }
                } else {
                    if (href === '/dashboard' ? path === '/dashboard' : path.startsWith(hrefPath)) {
                        el.classList.add('active');
                    }
                }
            });

            // ── 드롭다운 (클릭) ──────────────────────────
            document.querySelectorAll('.topnav-dropdown-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    btn.closest('.topnav-dropdown').classList.toggle('open');
                });
            });
            document.addEventListener('click', () => {
                document.querySelectorAll('.topnav-dropdown.open').forEach(d => d.classList.remove('open'));
            });

            // ── 모바일 햄버거 ────────────────────────────
            const hamburger = document.getElementById('topnavHamburger');
            const drawer    = document.getElementById('topnavDrawer');
            hamburger?.addEventListener('click', e => {
                e.stopPropagation();
                drawer.classList.toggle('open');
                hamburger.textContent = drawer.classList.contains('open') ? '✕' : '☰';
            });
            document.addEventListener('click', e => {
                if (!drawer?.contains(e.target) && e.target !== hamburger) {
                    drawer?.classList.remove('open');
                    if (hamburger) hamburger.textContent = '☰';
                }
            });
        })();
    </script>
</nav>

</html>
