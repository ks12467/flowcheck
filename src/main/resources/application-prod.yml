# ── 운영 환경 설정 (모든 민감 값은 환경변수로 주입) ────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  thymeleaf:
    cache: true

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  web:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

google:
  sheets:
    credentials-path: file:/app/config/credentials.json

gemini:
  api-key: ${GEMINI_API_KEY}

logging:
  level:
    root: INFO
    com.bootcamp.flowcheck: INFO
